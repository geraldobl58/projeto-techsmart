<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechSmart - Manutenção Industrial</title>
    <style>
      /* CSS: Padrões Web e Estilização */
      :root {
        --primary: #0056b3;
        --accent: #ffcc00;
        --dark: #333;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: #f4f4f4;
        color: var(--dark);
        line-height: 1.6;
      }
      header {
        background: var(--primary);
        color: white;
        padding: 2rem;
        text-align: center;
      }

      .container {
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      /* Grid de Serviços */
      .services-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 2rem;
      }

      .service-card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        border-left: 5px solid var(--primary);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .service-card:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        border-left-color: var(--accent);
      }

      /* Formulário */
      form {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        margin-top: 3rem;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        background: var(--primary);
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      @media (max-width: 600px) {
        .container {
          padding: 0 20px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>TechSmart</h1>
      <p>Soluções em Automação e Manutenção Industrial</p>
    </header>

    <div class="container">
      <h2>Nossos Serviços</h2>
      <div class="services-grid">
        <div class="service-card">
          <h3>Manutenção Preditiva</h3>
          <p>
            Análise de vibração e termografia para evitar paradas não
            planejadas.
          </p>
        </div>
        <div class="service-card">
          <h3>Automação PLC</h3>
          <p>Programação e otimização de linhas de produção inteligentes.</p>
        </div>
      </div>

      <form id="contact-form">
        <h3>Solicitar Chamado Técnico</h3>
        <input type="text" placeholder="Nome da Empresa" required />
        <input
          type="text"
          id="phone-field"
          placeholder="Telefone (mínimo 10 dígitos)"
          required
        />
        <button type="submit" id="submit-btn" disabled>
          Enviar Solicitação
        </button>
      </form>
    </div>

    <script>
      /* JS: Lógica de Validação e Interação */
      const phoneField = document.querySelector("#phone-field");
      const submitBtn = document.querySelector("#submit-btn");

      phoneField.addEventListener("input", function () {
        if (this.value.length >= 10) {
          this.style.borderColor = "green";
          submitBtn.disabled = false;
        } else {
          this.style.borderColor = "red";
          submitBtn.disabled = true;
        }
      });

      document
        .querySelector("#contact-form")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          alert(
            "Chamado registrado com sucesso! Dados enviados para o banco de dados (Notion).",
          );
        });
    </script>
  </body>
</html>
